name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet pack -c Release -o ./artifacts
        working-directory: csharp/src/MeasFlow
      - name: Push to NuGet
        run: dotnet nuget push "csharp/src/MeasFlow/artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  vcpkg:
    name: Update vcpkg port
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute source archive SHA512
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA512=$(curl -sL "$ARCHIVE_URL" | sha512sum | cut -d' ' -f1)
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Patch port files with SHA512 and version
        run: |
          sed -i "s/SHA512 0.*/SHA512 ${{ steps.sha.outputs.sha512 }}/" c/port/portfile.cmake
          sed -i 's/"version": ".*"/"version": "${{ steps.sha.outputs.version }}"/' c/port/vcpkg.json
      - name: Upload port as release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            c/port/portfile.cmake
            c/port/vcpkg.json

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [nuget, pypi, vcpkg]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
